
services:
  postgres:
    image: postgres:16-alpine
    container_name: todoapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todolist_test
    ports:
        - "5432:5432"
    volumes:
      - todoapp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  todoapp-pgdata: